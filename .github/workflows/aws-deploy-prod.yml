name: AWS Lightsail Deploy Snapshot (prod)

# Release publish 시 자체 Lightsail container service `zzzin-snapshot-prod`
# 에 snapshot 단독 deployment 발행. zzzin-api 와 분리 — api 는 private
# domain `zzzin-snapshot-prod.service.local` 로 통신.
#
# 첫 실행 시 container service 자동 생성 (idempotent).
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_REGION: ap-northeast-2
      LS_SERVICE: zzzin-snapshot-prod
      LS_POWER: nano
      LS_SCALE: 1
      CONTAINER_PORT: 6666
      IMAGE_NAME: zzzin-snapshot-prod:${{ github.event.release.tag_name || github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Lightsail control plugin
        run: |
          curl -sL "https://s3.us-west-2.amazonaws.com/lightsailctl/latest/linux-amd64/lightsailctl" \
            -o /usr/local/bin/lightsailctl
          sudo chmod +x /usr/local/bin/lightsailctl

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build snapshot image (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          tags: ${{ env.IMAGE_NAME }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Bootstrap container service (idempotent)
        run: |
          EXISTS=$(aws lightsail get-container-services \
            --service-name "${{ env.LS_SERVICE }}" \
            --region ${{ env.AWS_REGION }} \
            --query 'containerServices[0].containerServiceName' \
            --output text 2>/dev/null || echo "")
          if [ -z "$EXISTS" ] || [ "$EXISTS" = "None" ]; then
            echo "Creating Lightsail container service: ${{ env.LS_SERVICE }}"
            aws lightsail create-container-service \
              --service-name "${{ env.LS_SERVICE }}" \
              --power ${{ env.LS_POWER }} \
              --scale ${{ env.LS_SCALE }} \
              --region ${{ env.AWS_REGION }}
            for i in $(seq 1 60); do
              STATE=$(aws lightsail get-container-services \
                --service-name "${{ env.LS_SERVICE }}" \
                --region ${{ env.AWS_REGION }} \
                --query 'containerServices[0].state' --output text)
              echo "service state: $STATE"
              [ "$STATE" = "READY" ] && break
              sleep 10
            done
          else
            echo "Container service already exists: $EXISTS"
          fi

      - name: Push image to Lightsail registry
        id: push
        run: |
          OUT=$(aws lightsail push-container-image \
            --region ${{ env.AWS_REGION }} \
            --service-name ${{ env.LS_SERVICE }} \
            --label snapshot \
            --image ${{ env.IMAGE_NAME }})
          echo "$OUT"
          REF=$(echo "$OUT" | grep -oE ':[^"]+\.snapshot\.[0-9]+' | head -1)
          echo "image_ref=$REF" >> $GITHUB_OUTPUT
          echo "pushed: $REF"

      - name: Create container deployment (snapshot only)
        run: |
          REF="${{ steps.push.outputs.image_ref }}"
          cat > /tmp/containers.json <<JSON
          {
            "snapshot": {
              "image": "$REF",
              "command": [],
              "environment": {
                "PORT": "${{ env.CONTAINER_PORT }}"
              },
              "ports": {
                "${{ env.CONTAINER_PORT }}": "HTTP"
              }
            }
          }
          JSON
          aws lightsail create-container-service-deployment \
            --service-name ${{ env.LS_SERVICE }} \
            --region ${{ env.AWS_REGION }} \
            --containers file:///tmp/containers.json \
            --public-endpoint '{"containerName":"snapshot","containerPort":${{ env.CONTAINER_PORT }},"healthCheck":{"path":"/heartbeat","successCodes":"200"}}'

      - name: Wait for deployment ACTIVE
        run: |
          for i in $(seq 1 60); do
            STATE=$(aws lightsail get-container-services \
              --service-name ${{ env.LS_SERVICE }} \
              --region ${{ env.AWS_REGION }} \
              --query 'containerServices[0].currentDeployment.state' --output text)
            echo "deployment state: $STATE"
            [ "$STATE" = "ACTIVE" ] && exit 0
            [ "$STATE" = "FAILED" ] && exit 1
            sleep 10
          done
          echo "deployment poll timeout"
          exit 1
