name: AWS Lightsail Push Snapshot Image (prod)

# release publish 시 prod 의 Lightsail container service registry 로 snapshot
# 이미지 push. 그 후 zzzin-api repo 의 prod deploy workflow 를 trigger 하여
# api + snapshot 두 container 가 같이 새 deployment 로 올라감.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_REGION: ap-northeast-2
      LS_SERVICE: zzzin-api-prod
      IMAGE_NAME: zzzin-snapshot-prod:${{ github.event.release.tag_name || github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Lightsail control plugin
        run: |
          curl -sL "https://s3.us-west-2.amazonaws.com/lightsailctl/latest/linux-amd64/lightsailctl" \
            -o /usr/local/bin/lightsailctl
          sudo chmod +x /usr/local/bin/lightsailctl

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build snapshot image (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          tags: ${{ env.IMAGE_NAME }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push image to Lightsail registry
        run: |
          aws lightsail push-container-image \
            --region ${{ env.AWS_REGION }} \
            --service-name ${{ env.LS_SERVICE }} \
            --label snapshot \
            --image ${{ env.IMAGE_NAME }}

      - name: Trigger api repo prod deployment update
        env:
          GH_TOKEN: ${{ secrets.PAT_FOR_API_TRIGGER }}
        run: |
          if [ -n "$GH_TOKEN" ]; then
            curl -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/grasshopperTrainer/zzzin-api/actions/workflows/aws-deploy-prod.yml/dispatches" \
              -d '{"ref":"main"}'
            echo "triggered zzzin-api prod deploy"
          else
            echo "PAT_FOR_API_TRIGGER not set — manually run zzzin-api prod workflow to update deployment"
          fi
